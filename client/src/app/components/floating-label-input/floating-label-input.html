<div class="floating-field" [class.floating-field--has-value]="control().value" [class.floating-field--invalid]="control().invalid && control().touched">
  @if (type() === 'textarea') {
    <textarea
      class="floating-field__input"
      [formControl]="control()"
      [placeholder]="placeholder()"
      rows="3"
    ></textarea>
  } @else {
    <input
      class="floating-field__input"
      [type]="type()"
      [formControl]="control()"
      [placeholder]="placeholder()"
    />
  }
  <label class="floating-field__label">{{ label() }}</label>

  @if (control().invalid && control().touched) {
    <span class="floating-field__error">
      @if (control().hasError('required')) {
        {{ label() }} is required
      }
    </span>
  }
</div>
